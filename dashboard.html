<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windsurf Usage Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        body { background: #0f1117; color: #e1e4e8; font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .card-header { background: #1c2129; border-bottom: 1px solid #30363d; font-weight: 600; }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-value { font-size: 2.2rem; font-weight: 700; }
        .stat-label { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
        .text-green { color: #3fb950; }
        .text-yellow { color: #d29922; }
        .text-red { color: #f85149; }
        .text-blue { color: #58a6ff; }
        .text-purple { color: #bc8cff; }
        .table { color: #c9d1d9; }
        .table thead th { border-color: #30363d; color: #8b949e; font-size: 0.8rem; text-transform: uppercase; }
        .table td { border-color: #21262d; vertical-align: middle; }
        .badge-refill { background: #1f6feb33; color: #58a6ff; }
        .badge-purchase { background: #3fb95033; color: #3fb950; }
        .header-bar { background: linear-gradient(135deg, #1c2129 0%, #0d1117 100%); border-bottom: 1px solid #30363d; padding: 1rem 0; }
        .refresh-btn { border-color: #30363d; color: #8b949e; }
        .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .today-highlight { background: #1f6feb15; border-left: 3px solid #58a6ff; }
    </style>
</head>
<body>
    <div class="header-bar mb-4">
        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-0">🌊 Windsurf Usage Dashboard</h4>
                    <small class="text-muted" id="lastUpdated"></small>
                </div>
                <div class="d-flex gap-2">
                    <button id="syncBtn" class="btn btn-sm btn-outline-primary" onclick="syncNow()">⚡ Sync Now</button>
                    <button class="btn btn-sm btn-outline-secondary refresh-btn" onclick="loadData()">↻ Refresh</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4">
        <!-- Today's Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-label">Daily Quota Now</div>
                    <div class="stat-value" id="dailyNow">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-label">Weekly Quota Now</div>
                    <div class="stat-value" id="weeklyNow">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-label">Extra Balance</div>
                    <div class="stat-value text-green" id="balanceNow">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="stat-label">Today's Spending</div>
                    <div class="stat-value text-yellow" id="todaySpend">-</div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-3 mb-4">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header px-3 py-2">Daily Quota Over Time</div>
                    <div class="card-body p-3">
                        <canvas id="quotaChart" height="260"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header px-3 py-2">Extra Balance Over Time</div>
                    <div class="card-body p-3">
                        <canvas id="balanceChart" height="260"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header px-3 py-2">Daily Credit Spending (Last 7 Days)</div>
                    <div class="card-body p-3">
                        <canvas id="spendingChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header px-3 py-2">Spending Breakdown by Type</div>
                    <div class="card-body p-3">
                        <canvas id="typeChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Credit History Table -->
        <div class="row g-3 mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header px-3 py-2">Recent Credit History</div>
                    <div class="card-body p-0">
                        <table class="table table-sm mb-0">
                            <thead>
                                <tr>
                                    <th class="px-3">Type</th>
                                    <th>Amount</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="creditTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let quotaChart, balanceChart, spendingChart, typeChart;

        function parsePercent(str) {
            if (!str) return null;
            const m = str.match(/([\d.]+)%/);
            return m ? parseFloat(m[1]) : null;
        }

        function parseDollar(str) {
            if (!str) return null;
            const m = str.match(/\$([\d.]+)/);
            return m ? parseFloat(m[1]) : null;
        }

        function parseCreditDate(dateStr) {
            if (!dateStr) return null;
            const cleaned = dateStr.replace(/(st|nd|rd|th),/, ',');
            const d = new Date(cleaned);
            return isNaN(d) ? null : d;
        }

        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDateTime(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
                   d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function isToday(iso) {
            const d = new Date(iso);
            const now = new Date();
            return d.toDateString() === now.toDateString();
        }

        function getColor(pct) {
            if (pct >= 50) return '#3fb950';
            if (pct >= 20) return '#d29922';
            return '#f85149';
        }

        function createGradient(ctx, color1, color2) {
            const g = ctx.createLinearGradient(0, 0, 0, 260);
            g.addColorStop(0, color1);
            g.addColorStop(1, color2);
            return g;
        }

        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 11 } } },
                y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 11 } } }
            }
        };

        async function syncNow() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Syncing...';
            try {
                const res = await fetch('/api/sync', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'ok') {
                    btn.textContent = '✅ Synced!';
                    await loadData();
                } else {
                    btn.textContent = '❌ Error';
                    alert('Sync failed: ' + data.message);
                }
            } catch (e) {
                btn.textContent = '❌ Error';
                alert('Sync request failed: ' + e.message);
            } finally {
                setTimeout(() => { btn.disabled = false; btn.textContent = '⚡ Sync Now'; }, 3000);
            }
        }

        async function loadData() {
            const [quotaRes, creditRes] = await Promise.all([
                fetch('/api/quota'), fetch('/api/credit')
            ]);
            const quota = await quotaRes.json();
            const credit = await creditRes.json();

            renderStats(quota, credit);
            renderQuotaChart(quota);
            renderBalanceChart(quota);
            renderSpendingChart(credit);
            renderTypeChart(credit);
            renderCreditTable(credit);

            document.getElementById('lastUpdated').textContent =
                'Last updated: ' + new Date().toLocaleTimeString();
        }

        function renderStats(quota, credit) {
            const latest = quota[quota.length - 1];
            if (!latest) return;

            const daily = parsePercent(latest.daily_quota);
            const weekly = parsePercent(latest.weekly_quota);
            const balance = parseDollar(latest.extra_balance);

            const dailyEl = document.getElementById('dailyNow');
            dailyEl.textContent = daily !== null ? daily + '%' : '-';
            dailyEl.className = 'stat-value ' + (daily !== null ? (daily >= 50 ? 'text-green' : daily >= 20 ? 'text-yellow' : 'text-red') : '');

            const weeklyEl = document.getElementById('weeklyNow');
            weeklyEl.textContent = weekly !== null ? weekly + '%' : '-';
            weeklyEl.className = 'stat-value ' + (weekly !== null ? (weekly >= 50 ? 'text-green' : weekly >= 20 ? 'text-yellow' : 'text-red') : '');

            document.getElementById('balanceNow').textContent = balance !== null ? '$' + balance.toFixed(2) : '-';

            // Today's spending from credit history
            const today = new Date();
            const todayStr = today.toDateString();
            let todayTotal = 0;
            credit.forEach(c => {
                const d = parseCreditDate(c.date);
                if (d && d.toDateString() === todayStr) {
                    todayTotal += parseDollar(c.amount) || 0;
                }
            });
            document.getElementById('todaySpend').textContent = '$' + todayTotal.toFixed(2);
        }

        function renderQuotaChart(quota) {
            const ctx = document.getElementById('quotaChart').getContext('2d');
            if (quotaChart) quotaChart.destroy();

            const labels = quota.map(q => formatDateTime(q.timestamp));
            const dailyData = quota.map(q => parsePercent(q.daily_quota));
            const weeklyData = quota.map(q => parsePercent(q.weekly_quota));

            quotaChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Daily Quota %',
                            data: dailyData,
                            borderColor: '#58a6ff',
                            backgroundColor: createGradient(ctx, '#58a6ff33', '#58a6ff00'),
                            fill: true,
                            tension: 0.3,
                            pointRadius: 3,
                            borderWidth: 2
                        },
                        {
                            label: 'Weekly Quota %',
                            data: weeklyData,
                            borderColor: '#bc8cff',
                            backgroundColor: '#bc8cff11',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 3,
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    ...chartDefaults,
                    plugins: {
                        legend: { display: true, labels: { color: '#8b949e', padding: 15, usePointStyle: true } }
                    },
                    scales: {
                        ...chartDefaults.scales,
                        y: { ...chartDefaults.scales.y, min: 0, max: 100, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + '%' } }
                    }
                }
            });
        }

        function renderBalanceChart(quota) {
            const ctx = document.getElementById('balanceChart').getContext('2d');
            if (balanceChart) balanceChart.destroy();

            const labels = quota.map(q => formatTime(q.timestamp));
            const data = quota.map(q => parseDollar(q.extra_balance));

            balanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Balance $',
                        data,
                        borderColor: '#3fb950',
                        backgroundColor: createGradient(ctx, '#3fb95033', '#3fb95000'),
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        borderWidth: 2
                    }]
                },
                options: {
                    ...chartDefaults,
                    scales: {
                        ...chartDefaults.scales,
                        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => '$' + v } }
                    }
                }
            });
        }

        function renderSpendingChart(credit) {
            const ctx = document.getElementById('spendingChart').getContext('2d');
            if (spendingChart) spendingChart.destroy();

            // Aggregate spending by date (last 7 days)
            const dailySpend = {};
            const today = new Date();

            // Create last 7 day labels
            const dayLabels = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const key = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                dayLabels.push(key);
                dailySpend[key] = 0;
            }

            credit.forEach(c => {
                const d = parseCreditDate(c.date);
                if (!d) return;
                const key = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                if (key in dailySpend) {
                    dailySpend[key] += parseDollar(c.amount) || 0;
                }
            });

            const data = dayLabels.map(l => dailySpend[l]);
            const todayLabel = dayLabels[dayLabels.length - 1];
            const colors = dayLabels.map(l => l === todayLabel ? '#58a6ff' : '#30363d');
            const borders = dayLabels.map(l => l === todayLabel ? '#58a6ff' : '#484f58');

            spendingChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dayLabels,
                    datasets: [{
                        label: 'Spent',
                        data,
                        backgroundColor: colors,
                        borderColor: borders,
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    ...chartDefaults,
                    scales: {
                        ...chartDefaults.scales,
                        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => '$' + v } }
                    }
                }
            });
        }

        function renderTypeChart(credit) {
            const ctx = document.getElementById('typeChart').getContext('2d');
            if (typeChart) typeChart.destroy();

            const types = {};
            credit.forEach(c => {
                const desc = c.description || 'Unknown';
                const amt = parseDollar(c.amount) || 0;
                types[desc] = (types[desc] || 0) + amt;
            });

            const labels = Object.keys(types);
            const data = Object.values(types);
            const palette = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f0883e'];

            typeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: palette.slice(0, labels.length),
                        borderColor: '#161b22',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#8b949e', padding: 12, usePointStyle: true, font: { size: 11 } }
                        },
                        tooltip: {
                            callbacks: { label: ctx => ctx.label + ': $' + ctx.parsed.toFixed(2) }
                        }
                    }
                }
            });
        }

        function renderCreditTable(credit) {
            const tbody = document.getElementById('creditTable');
            const today = new Date().toDateString();

            // Sort newest to oldest by date, then by id descending as tiebreaker
            const sorted = [...credit].sort((a, b) => {
                const da = parseCreditDate(a.date);
                const db = parseCreditDate(b.date);
                if (da && db) {
                    if (db - da !== 0) return db - da;
                }
                return b.id - a.id;
            });
            tbody.innerHTML = sorted.map(c => {
                const d = parseCreditDate(c.date);
                const isToday = d && d.toDateString() === today;
                const badge = c.description && c.description.includes('refill')
                    ? '<span class="badge badge-refill">Auto Refill</span>'
                    : '<span class="badge badge-purchase">Purchase</span>';
                return `<tr class="${isToday ? 'today-highlight' : ''}">
                    <td class="px-3">${badge} ${c.description || ''}</td>
                    <td><strong>${c.amount || '-'}</strong></td>
                    <td>${c.date || '-'} ${isToday ? '<span class="badge bg-primary">Today</span>' : ''}</td>
                </tr>`;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
